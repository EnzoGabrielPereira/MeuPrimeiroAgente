<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MisterIA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
</head>

<body>

<div class="chat-container">

    <header class="chat-header">
        <div class="header-info">
            <div class="header-avatar">⚽</div>
            <div>
                <h2>Mister IA</h2>
                <span class="status-indicator"><span class="status-dot"></span> Online</span>
            </div>
        </div>
        <a href="/" class="btn-back">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Início</span>
        </a>
    </header>

    <section class="messages" id="messages">
        <!-- Messages will be rendered here dynamically -->
    </section>

    <footer class="chat-footer">
        <div class="input-wrapper">
            <textarea
                id="inputMensagem"
                placeholder="Pergunte sobre a Copa de 2026..."
                rows="1"
                autofocus
            ></textarea>
        </div>
        <button id="btnEnviar" title="Enviar mensagem">
            <span>Enviar</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>

</body>

</html>
